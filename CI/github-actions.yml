name: claw-forge plugin CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  plugin-manifest-validation:
    name: Plugin manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ajv-cli
        run: npm install -g ajv-cli@5
      - name: Validate plugin.json against schema
        run: ajv validate -s .claude-plugin/plugin.schema.json -d .claude-plugin/plugin.json

  skill-structural-self-tests:
    name: Skill structural self-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run skill structural fixtures
        run: sh tests/skills/run-all.sh

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: markdownlint 'commands/**/*.md' 'skills/**/*.md' 'agents/**/*.md' 'docs/**/*.md'

  shell-lint:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck hooks/*.sh

  no-sdk-invariant:
    name: No-SDK invariant (PRD §9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for SDK patterns
        run: |
          hits=$(grep -rE 'claude_agent_sdk|claude-agent-sdk|claude -p' --exclude-dir=docs . || true)
          if [ -n "$hits" ]; then
            echo "ERROR: SDK pattern found in plugin tree (PRD §9 hard invariant violated):"
            echo "$hits"
            exit 1
          fi
