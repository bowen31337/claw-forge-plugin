name: claw-forge plugin CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  plugin-manifest-validation:
    name: Plugin manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ajv-cli
        run: npm install -g ajv-cli@5
      - name: Validate plugin.json against schema
        run: ajv validate -s .claude-plugin/plugin.schema.json -d .claude-plugin/plugin.json

  skill-structural-self-tests:
    name: Skill structural self-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run skill structural fixtures
        run: sh tests/skills/run-all.sh

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Lint markdown files
        run: |
          markdownlint \
            'commands/**/*.md' \
            'skills/**/*.md' \
            'agents/**/*.md' \
            'docs/**/*.md'

  shell-lint:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Run shellcheck on hooks
        run: |
          find hooks -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning

  no-sdk-invariant:
    name: No-SDK invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert zero SDK references in plugin tree
        run: |
          if grep -rE 'claude_agent_sdk|claude-agent-sdk|claude -p' \
               --include='*.md' \
               --include='*.sh' \
               --include='*.json' \
               --include='*.yaml' \
               --include='*.yml' \
               --exclude-dir=docs \
               .; then
            echo "ERROR: SDK reference found in plugin tree (see above). Hard fail." >&2
            exit 1
          fi
          echo "OK: zero SDK references found."

  cli-contract-smoke:
    name: CLI contract smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      MIN_SIDECAR: "0.6.0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar at MIN declared version
        run: pip install "claw-forge==${MIN_SIDECAR}"

      - name: Run CLI contract smoke test
        run: sh tests/smoke/run-reference-spec.sh --contract-only
        # --contract-only exercises CLI commands without dispatching any LLM agents.
        # Full end-to-end (LLM dispatch) is intentionally excluded from CI.
