name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:

  # ── Feature 41: Plugin manifest validation ─────────────────────────────────
  plugin-manifest-validation:
    name: Plugin manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Validate .claude-plugin/plugin.json
        run: |
          node - << 'JS'
          const fs = require('fs');
          const p = '.claude-plugin/plugin.json';

          let manifest;
          try {
            manifest = JSON.parse(fs.readFileSync(p, 'utf8'));
          } catch (e) {
            console.error(`ERROR: cannot parse ${p}: ${e.message}`);
            process.exit(1);
          }

          const errors = [];
          ['name','version','description','author','license'].forEach(k => {
            if (!manifest[k]) errors.push(`missing required field: ${k}`);
          });
          if (manifest.name      && manifest.name !== 'claw-forge')
            errors.push(`name must be "claw-forge", got "${manifest.name}"`);
          if (manifest.version   && !/^\d+\.\d+\.\d+/.test(manifest.version))
            errors.push(`version must be semver, got "${manifest.version}"`);
          if (manifest.license   && manifest.license !== 'Apache-2.0')
            errors.push(`license must be "Apache-2.0", got "${manifest.license}"`);
          if (manifest.keywords  && !Array.isArray(manifest.keywords))
            errors.push('keywords must be an array');

          if (errors.length) {
            errors.forEach(e => console.error('ERROR:', e));
            process.exit(1);
          }
          console.log('Plugin manifest validation: PASS');
          console.log(`  name=${manifest.name}  version=${manifest.version}  license=${manifest.license}`);
          JS

  # ── Feature 42: Markdown lint ──────────────────────────────────────────────
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Lint markdown files
        run: |
          find commands skills agents docs -name '*.md' -print0 \
            | xargs -0 markdownlint --disable MD013 MD033 MD041 --

  # ── Feature 43: Shell lint ─────────────────────────────────────────────────
  shell-lint:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: find hooks -name '*.sh' -print0 | xargs -0 shellcheck

  # ── Feature 44: No-SDK invariant (PRD §9) ─────────────────────────────────
  no-sdk-invariant:
    name: No SDK invariant (PRD §9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for claude_agent_sdk / claude -p references
        run: |
          HITS=$(
            grep -rE 'claude_agent_sdk|claude-agent-sdk|claude -p' . \
              --exclude-dir='.git' \
              --include='*.md' \
              --include='*.sh' \
              --include='*.json' \
              --include='*.py' \
              -l || true
          )
          if [ -n "$HITS" ]; then
            echo "ERROR: SDK references found — PRD §9 invariant violated:"
            echo "$HITS"
            # Show offending lines for diagnosis
            # shellcheck disable=SC2086
            grep -rE 'claude_agent_sdk|claude-agent-sdk|claude -p' $HITS || true
            exit 1
          fi
          echo "No SDK references found: PASS"

  # ── Feature 45: Skill structural self-tests ────────────────────────────────
  skill-structural-self-tests:
    name: Skill structural self-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run skill structural fixtures
        run: bash tests/skills/run-fixtures.sh

  # ── Feature 46: Cross-repo CLI-contract smoke test ─────────────────────────
  #
  # Prerequisites (set once in repo Settings → Variables → Actions):
  #   SIDECAR_REPO  — e.g. "clawinfra/claw-forge"
  #
  # Matrix: runs the smoke test twice — once against the MIN declared sidecar
  # version (must match MIN_SIDECAR in hooks/ensure-sidecar.sh) and once
  # against HEAD of the sidecar default branch.
  cli-contract-smoke-test:
    name: CLI contract smoke (${{ matrix.sidecar-label }})
    runs-on: ubuntu-latest
    timeout-minutes: 2
    strategy:
      fail-fast: false
      matrix:
        include:
          - sidecar-ref: 'v0.6.0'
            sidecar-label: 'min-version (v0.6.0)'
          - sidecar-ref: 'main'
            sidecar-label: 'head (main)'
    steps:
      - name: Check out plugin repo
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Check out sidecar at ${{ matrix.sidecar-ref }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SIDECAR_REPO }}
          ref: ${{ matrix.sidecar-ref }}
          path: sidecar-src

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sidecar from source
        run: pip install ./sidecar-src

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Configure git identity (required by worktree commands)
        run: |
          git config --global user.email "ci@claw-forge.smoke"
          git config --global user.name "CI Smoke"

      - name: Run CLI contract smoke test
        run: bash plugin/tests/cli-contract/smoke-test.sh
